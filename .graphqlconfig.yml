projects:
  RAC Sensors Test API:
    schemaPath: src/graphql/schema.json
    includes:
      - src/graphql/**/*.js
    excludes:
      - ./amplify/**
    extensions:
      amplify:
        codeGenTarget: javascript
        generatedFileName: ''
        docsFilePath: src/graphql
        region: us-east-2
        apiId: ldzzofkxcrhgxhz4chxefqlos4
        maxDepth: 2
extensions:
  amplify:
    version: 3
